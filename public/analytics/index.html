<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Analytics | Boosted Movers</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%231a7a4a'/><text y='.9em' font-size='52' font-family='system-ui' font-weight='700' fill='white' x='12' y='68'>BM</text></svg>">
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/analytics-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ─── BM light palette (default) ────────────────────────── */
    :root {
      --bg:           #f4f7f4;
      --surface:      #ffffff;
      --surface2:     #eaf0ea;
      --border:       #cfdbd0;
      --text:         #1a2e1e;
      --text2:        #4a6a52;
      --text3:        #7a9a82;
      --accent:       #16a34a;
      --accent-hover: #15803d;
      --accent-light: #dcfce7;
      --accent-text:  #15803d;
      --danger:       #dc2626;
      --danger-light: #fef2f2;
      --amber:        #d97706;
      --amber-light:  #fffbeb;
      --success:      #16a34a;
      --success-light:#f0fdf4;
      --shadow:       0 1px 4px rgba(0,0,0,.1);
    }

    /* ─── BM dark palette ────────────────────────────────────── */
    body.dark {
      --bg:           #0f1410;
      --surface:      #161e18;
      --surface2:     #1e2a20;
      --border:       #2a3c2e;
      --text:         #e8f0ea;
      --text2:        #7a9a82;
      --text3:        #4a6a52;
      --accent:       #22c55e;
      --accent-hover: #16a34a;
      --accent-light: #1a2e1e;
      --accent-text:  #4ade80;
      --danger:       #f87171;
      --danger-light: #2d1b1b;
      --amber:        #fbbf24;
      --amber-light:  #2d2010;
      --success:      #22c55e;
      --success-light:#1a2e1e;
      --shadow:       0 1px 4px rgba(0,0,0,.3);
    }

    /* ─── Analytics-specific ─────────────────────────────────── */
    .a-metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
    }
    .a-metric:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.2); }
    .a-chg-pos { font-size: 11px; font-weight: 600; color: var(--success); margin-top: 3px; }
    .a-chg-neg { font-size: 11px; font-weight: 600; color: var(--danger);  margin-top: 3px; }
    .a-chg-nil { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .platform-section { padding-bottom: 28px; margin-bottom: 4px; border-bottom: 1px solid var(--border); }
    .platform-section:last-child { border-bottom: none; padding-bottom: 0; }
    .platform-badge {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .5px; flex-shrink: 0;
    }
    .goals-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .goals-row { margin-bottom: 12px; }
    .goals-row:last-child { margin-bottom: 0; }
    .goals-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; gap: 12px; }
    .goals-label { font-size: 13px; color: var(--text); }
    .goals-progress { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
    .ag3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow); }
    @media (max-width: 900px) { .ag3 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px) { .ag3 { grid-template-columns: 1fr; } }

    /* ─── Skeleton shimmer ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 2rem;
      width: 60%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── Fade-in ── */
    .metric-fade-in { animation: fadeIn .4s ease; }

    /* ─── Header row ── */
    .analytics-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    }
    .analytics-header-right {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .last-refreshed { font-size: 11px; color: var(--text3); }
    .refresh-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); color: var(--text2);
      background: var(--surface); cursor: pointer; transition: all .15s;
    }
    .refresh-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
    .refresh-btn.spinning .refresh-icon { display: inline-block; animation: spin .8s linear infinite; }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ─── Status badges ── */
    .data-badge-cached {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600;
      background: var(--amber-light); color: var(--amber); border: 1px solid var(--amber);
      margin-left: 8px; vertical-align: middle;
    }
    .data-badge-live {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600;
      background: var(--success-light); color: var(--success); border: 1px solid var(--success);
      margin-left: 8px; vertical-align: middle;
    }

    /* ─── Instagram coming soon ── */
    .platform-section.coming-soon-section { position: relative; }
    .coming-soon-overlay {
      position: absolute; inset: 0;
      background: rgba(13,17,23,0.45);
      border-radius: var(--radius); pointer-events: none; z-index: 1;
    }
    .coming-soon-badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
      background: var(--amber-light); color: var(--amber); border: 1px solid var(--amber);
      margin-left: 8px;
    }
    .coming-soon-checklist {
      margin-top: 12px; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .check-item { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 4px 0; color: var(--text3); }
    .check-item.done { color: var(--success); }
    .check-item.pending { color: var(--text3); }

    /* ─── TikTok OAuth connect button ── */
    .tt-connect-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      background: #010101; color: #fff; border: none; cursor: pointer;
      transition: opacity .15s; letter-spacing: .2px;
    }
    .tt-connect-btn:hover { opacity: .82; }
    .tt-connect-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ─── TikTok status banners ── */
    .tt-status-live {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 10px 12px; margin-bottom: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 11px;
    }
    .tt-status-expired {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 10px 12px; margin-bottom: 12px;
      background: var(--surface2); border: 1px solid var(--amber);
      border-radius: var(--radius); font-size: 11px;
    }
    .tt-status-note { font-size: 10px; color: var(--text3); }

    /* ─── TikTok video rows ── */
    .tt-video-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .tt-video-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--text3); font-weight: 700; margin-bottom: 8px;
    }

    /* ─── TikTok analytics: 6-col summary grid ── */
    .ag6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 14px; }
    @media (max-width: 1100px) { .ag6 { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 600px)  { .ag6 { grid-template-columns: repeat(2,1fr); } }

    /* ─── Top video highlighted card ── */
    .tt-top-video-card {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid #00C2A8; border-radius: var(--radius);
      padding: 12px; margin-bottom: 14px;
    }
    .tt-top-video-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      background: #00C2A8; color: #fff; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px;
    }

    /* ─── Tab switcher ── */
    .tt-tabs { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .tt-tab {
      padding: 4px 14px; border-radius: 6px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); cursor: pointer; transition: all .15s;
    }
    .tt-tab.active { background: #00C2A8; color: #fff; border-color: #00C2A8; }
    .tt-tab:hover:not(.active) { border-color: #00C2A8; color: #00C2A8; }

    /* ─── Video table rows ── */
    .tt-vt-row { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .tt-vt-row:last-child { border-bottom: none; }
    .tt-vt-thumb { width: 32px; height: 44px; border-radius: 4px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
    .tt-vt-meta { flex: 1; min-width: 0; }
    .tt-vt-title { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tt-vt-stats { display: flex; gap: 8px; font-size: 10px; color: var(--text3); margin-bottom: 4px; flex-wrap: wrap; }
    .tt-vt-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; }
    .tt-vt-bar { height: 3px; background: #00C2A8; border-radius: 2px; transition: width .3s; }
    .tt-vt-date { font-size: 10px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }

    /* ─── Loading / error states ── */
    .tt-loading-state { padding: 28px; text-align: center; color: var(--text3); font-size: 12px; }
    .tt-error-state {
      padding: 12px 14px; font-size: 12px; color: var(--danger);
      background: var(--surface2); border: 1px solid var(--danger);
      border-radius: var(--radius); margin-top: 8px;
    }

    /* ─── Spinner loader ── */
    .tt-loader-wrap { padding: 60px 20px; text-align: center; }
    .tt-spinner {
      width: 36px; height: 36px; margin: 0 auto 14px;
      border: 3px solid var(--border); border-top-color: #00C2A8;
      border-radius: 50%; animation: ttSpin .75s linear infinite;
    }
    @keyframes ttSpin { to { transform: rotate(360deg); } }
    .tt-loader-msg { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
    .tt-loader-sub { font-size: 11px; color: var(--text3); }

    /* ─── Tooltip system ── */
    [data-tooltip] { position: relative; }
    [data-tooltip]::before {
      content: attr(data-tooltip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: rgba(22,27,34,.96); color: #e6edf3;
      font-size: 10px; line-height: 1.5; font-weight: 400;
      padding: 6px 10px; border-radius: 6px;
      width: 180px; text-align: center;
      pointer-events: none; opacity: 0;
      transition: opacity .18s; z-index: 300;
      white-space: normal; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    [data-tooltip]::after {
      content: ''; position: absolute; bottom: calc(100% + 3px); left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent; border-top-color: rgba(22,27,34,.96);
      pointer-events: none; opacity: 0; transition: opacity .18s; z-index: 300;
    }
    [data-tooltip]:hover::before, [data-tooltip]:hover::after { opacity: 1; }

    /* ─── Monthly top videos ── */
    .tt-monthly-scroll {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .tt-monthly-scroll::-webkit-scrollbar { height: 4px; }
    .tt-monthly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tt-monthly-card {
      min-width: 120px; max-width: 120px; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .tt-monthly-label {
      font-size: 9px; font-weight: 700; color: #00C2A8;
      letter-spacing: .5px; text-transform: uppercase; padding: 6px 8px 4px;
    }
    .tt-monthly-thumb { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
    .tt-monthly-thumb-placeholder {
      width: 100%; aspect-ratio: 9/16; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text3);
    }
    .tt-monthly-info { padding: 7px 8px 8px; }
    .tt-monthly-title {
      font-size: 9px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tt-monthly-stats { display: flex; flex-direction: column; gap: 2px; font-size: 9px; color: var(--text3); }

    /* ─── Charts tab ── */
    .tt-chart-block { margin-bottom: 18px; }
    .tt-chart-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .tt-chart-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 8px 6px; overflow: hidden; }

    /* ─── Metric card with sparkline ── */
    .tt-metric-inner { display: flex; justify-content: space-between; align-items: flex-end; gap: 6px; }
    .tt-metric-inner svg { flex-shrink: 0; align-self: flex-end; }

    /* ─── Overview / Trends main tab bar ── */
    .tt-main-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
    .tt-main-tab {
      padding: 7px 18px; font-size: 12px; font-weight: 600;
      border: none; background: none; color: var(--text3);
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tt-main-tab.active { color: #00C2A8; border-bottom-color: #00C2A8; }
    .tt-main-tab:hover:not(.active) { color: var(--text2); }

    /* ─── Chart time-range filter ── */
    .tt-range-wrap { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
    .tt-range-btn {
      padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text3); cursor: pointer; transition: all .15s;
    }
    .tt-range-btn.active { background: var(--surface2); border-color: var(--text2); color: var(--text); }
    .tt-range-btn:hover:not(.active) { border-color: var(--text2); color: var(--text2); }

    /* ─── TikTok profile card ── */
    .tt-profile-card {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px;
    }
    .tt-profile-left { display: flex; align-items: center; gap: 10px; }
    .tt-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
    .tt-avatar-placeholder { background: #00C2A8; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .tt-display-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .tt-profile-handle { font-size: 11px; color: var(--text3); }
    .tt-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    @media (max-width: 480px) { .tt-stats-row { grid-template-columns: repeat(2, 1fr); } }
    .tt-stat-cell {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 8px; text-align: center;
    }
    .tt-stat-val { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 3px; }
    .tt-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); font-weight: 600; }

    /* ─── Social overview / platform selector ── */
    .social-top-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .social-top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .social-top-title { font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .5px; }
    .social-platforms-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 600px) { .social-platforms-row { grid-template-columns: 1fr; } }
    .social-platform-cell {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .social-platform-cell:hover:not(.active) { border-color: var(--text3); background: var(--surface); }
    .social-platform-cell.active { border-color: var(--accent) !important; background: var(--accent-light) !important; }
    .social-platform-cell.coming-soon-cell { opacity: 0.45; filter: grayscale(0.2); }
    .social-cell-badge { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: .4px; flex-shrink: 0; }
    .social-cell-info { min-width: 0; }
    .social-cell-name { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .social-cell-val { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .social-cell-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* ─── Feature card style (MoverMetrics) on section headers ── */
    .section-header-accent {
      display: inline-block; width: 3px; height: 18px;
      background: var(--accent); border-radius: 2px; margin-right: 8px; vertical-align: middle;
    }

    /* ─── YouTube video table (16:9 thumbs) ── */
    .yt-vt-thumb {
      width: 56px; height: 32px; border-radius: 4px; object-fit: cover; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .yt-vt-thumb-placeholder {
      width: 56px; height: 32px; border-radius: 4px; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text3);
    }

    /* ─── YouTube 5-col stats grid ── */
    .ag5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 14px; }
    @media (max-width: 1000px) { .ag5 { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 600px)  { .ag5 { grid-template-columns: repeat(2,1fr); } }

    /* ─── Theme toggle ── */
    .theme-toggle {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px 4px 6px;
      cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--text2); transition: background .15s, border-color .15s, color .15s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theme-toggle-icon { font-size: 14px; line-height: 1; }

    /* ─── Footer ── */
    .analytics-footer {
      margin-top: 32px; padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      font-size: 12px; color: var(--text3);
    }
    .footer-links { display: flex; align-items: center; gap: 14px; }
    .footer-links a {
      color: var(--text3); text-decoration: none; font-weight: 500;
      transition: color .15s;
    }
    .footer-links a:hover { color: var(--accent); }
    .footer-sep { color: var(--border); }
    .footer-copy { color: var(--text3); }
  </style>
</head>
<body>

<!-- ─── Topbar ──────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">BM</div>
    <div>
      <span class="logo-text">Boosted Movers</span>
      <span class="logo-sub">Analytics</span>
    </div>
  </div>
  <div class="topbar-right">
    <a href="../index.html" class="btn btn-ghost" style="text-decoration:none;font-size:12px">← Dashboard</a>
    <div class="time-display" id="time-display">—</div>
  </div>
</header>

<!-- ─── Content ─────────────────────────────────────────────── -->

// ─── INSTAGRAM API FUNCTIONS ─────────────────────────────────────
function igEscH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function igFmtN(n) {
  if (!n && n !== 0) return '—'
  const v = Number(n)
  if (v >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/,'')+'M'
  if (v >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,'')+'K'
  return String(v)
}
function igFmtDate(iso) {
  if (!iso) return ''
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
}

// ─── INSTAGRAM ANALYTICS HELPERS ─────────────────────────────────
function igGroupByMonth(media) {
  const map = {}
  media.forEach(p => {
    if (!p.timestamp) return
    const d   = new Date(p.timestamp)
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
    const lbl = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
    if (!map[key]) map[key] = { key, label: lbl, posts: [], likes: 0, comments: 0, count: 0 }
    map[key].posts.push(p)
    map[key].likes    += p.like_count     || 0
    map[key].comments += p.comments_count || 0
    map[key].count    += 1
  })
  return Object.values(map).sort((a, b) => a.key.localeCompare(b.key))
}

function igEnrichData(data) {
  return data.map(m => ({
    ...m,
    eng: m.count ? +((m.likes + m.comments) / m.count).toFixed(1) : 0,
    avg: m.count ? Math.round(m.likes / m.count) : 0
  }))
}

function getIGChartData(media, range) {
  const now     = new Date()
  const byMonth = igGroupByMonth(media)
  if (range === 'all') return igEnrichData(byMonth)
  const n = range === '6m' ? 6 : 3
  const cutoff = new Date(now)
  cutoff.setMonth(cutoff.getMonth() - n)
  const cutKey = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}`
  return igEnrichData(byMonth.filter(m => m.key >= cutKey))
}

function renderIGTopReel(media, selectedMonth) {
  const byMonth = igGroupByMonth(media)
  if (!byMonth.length) return '<div style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">No post data available</div>'
  const opts = byMonth.slice().reverse().map(m =>
    `<option value="${m.key}"${m.key === selectedMonth ? ' selected' : ''}>${m.label}</option>`
  ).join('')
  const monthData = byMonth.find(m => m.key === selectedMonth)
  let cardHtml
  if (!monthData || !monthData.posts.length) {
    cardHtml = `<div style="padding:14px;text-align:center;font-size:12px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)">No posts this month</div>`
  } else {
    const top = monthData.posts.reduce((a, b) =>
      ((b.like_count||0) + (b.comments_count||0)) > ((a.like_count||0) + (a.comments_count||0)) ? b : a
    )
    const typeLabel = top.media_type === 'VIDEO' ? 'REEL' : top.media_type === 'CAROUSEL_ALBUM' ? 'CAROUSEL' : 'IMAGE'
    const thumbSrc  = top.thumbnail_url || (top.media_type !== 'VIDEO' ? top.media_url : null)
    const thumb = thumbSrc
      ? `<img src="${igEscH(thumbSrc)}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)" alt="">`
      : `<div style="width:56px;height:78px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;color:var(--text3)">📷</div>`
    const caption = igEscH((top.caption || '').substring(0, 60) + ((top.caption || '').length > 60 ? '…' : ''))
    cardHtml = `<div class="tt-top-video-card" style="border-left-color:#E1306C">
      ${thumb}
      <div style="flex:1;min-width:0">
        <div class="tt-top-video-badge" style="background:#E1306C">🏆 Top ${typeLabel} — ${monthData.label}</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px;line-height:1.4">${caption || '(no caption)'}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text2)">♥ <strong>${igFmtN(top.like_count)}</strong> likes</span>
          <span style="font-size:11px;color:var(--text2)">💬 <strong>${igFmtN(top.comments_count)}</strong> comments</span>
          ${top.timestamp ? `<span style="font-size:11px;color:var(--text3)">${igFmtDate(top.timestamp)}</span>` : ''}
        </div>
      </div>
    </div>`
  }
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:700">🏆 Top Post of the Month</div>
    <select onchange="setIGMonthFilter(this.value)" style="font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);cursor:pointer;outline:none">${opts}</select>
  </div>${cardHtml}`
}

function renderIGPostTableRows(posts, allPosts) {
  if (!posts || !posts.length) return '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">No posts found</div>'
  const maxEng = Math.max(...allPosts.map(p => (p.like_count||0) + (p.comments_count||0)), 1)
  return posts.map(p => {
    const caption   = igEscH((p.caption || '').substring(0, 80) + ((p.caption || '').length > 80 ? '…' : ''))
    const typeLabel = p.media_type === 'VIDEO' ? 'REEL' : p.media_type === 'CAROUSEL_ALBUM' ? 'CAROUSEL' : 'IMAGE'
    const typeColor = typeLabel === 'REEL' ? '#E1306C' : typeLabel === 'CAROUSEL' ? '#8b5cf6' : '#3b82f6'
    const thumbSrc  = p.thumbnail_url || (p.media_type !== 'VIDEO' ? p.media_url : null)
    const thumb     = thumbSrc
      ? `<img src="${igEscH(thumbSrc)}" class="tt-vt-thumb" alt="">`
      : `<div class="tt-vt-thumb" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">📷</div>`
    const eng    = (p.like_count||0) + (p.comments_count||0)
    const barPct = Math.round((eng / maxEng) * 100)
    return `<div class="tt-vt-row">
      ${thumb}
      <div class="tt-vt-meta">
        <div style="margin-bottom:3px">
          <span style="font-size:8px;font-weight:700;background:${typeColor};color:#fff;padding:1px 5px;border-radius:3px">${typeLabel}</span>
        </div>
        <div class="tt-vt-title" title="${igEscH(p.caption||'')}">${caption || '(no caption)'}</div>
        <div class="tt-vt-stats">
          <span>♥ ${igFmtN(p.like_count)}</span>
          <span>💬 ${igFmtN(p.comments_count)}</span>
        </div>
        <div class="tt-vt-bar-wrap"><div class="tt-vt-bar" style="width:${barPct}%;background:#E1306C"></div></div>
      </div>
      <div class="tt-vt-date">${igFmtDate(p.timestamp)}</div>
    </div>`
  }).join('')
}

function renderIGPaginatedTable(pool, allPosts, page, pageSize) {
  const totalPages = Math.ceil(pool.length / pageSize)
  const rows = renderIGPostTableRows(pool.slice(page * pageSize, (page + 1) * pageSize), allPosts)
  if (totalPages <= 1) return rows
  return `${rows}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
    <button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setIGPostPage(${page-1})"${page===0?' disabled':''}>← Prev</button>
    <span style="font-size:11px;color:var(--text3)">Page ${page+1} of ${totalPages} · ${pool.length} posts</span>
    <button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setIGPostPage(${page+1})"${page>=totalPages-1?' disabled':''}>Next →</button>
  </div>`
}

function renderIGOverviewContent(profile, media) {
  const byMonth    = igGroupByMonth(media)
  const mLikes     = byMonth.map(m => m.likes)
  const mComments  = byMonth.map(m => m.comments)
  const mEng       = byMonth.map(m => m.count ? +((m.likes+m.comments)/m.count).toFixed(1) : 0)
  const mAvg       = byMonth.map(m => m.count ? Math.round(m.likes/m.count) : 0)
  const mCount     = byMonth.map(m => m.count)

  const totalLikes    = media.reduce((s, p) => s + (p.like_count     || 0), 0)
  const totalComments = media.reduce((s, p) => s + (p.comments_count || 0), 0)
  const followers     = profile.followers_count || 0
  const avgLikes      = media.length ? Math.round(totalLikes / media.length) : 0
  const avgComments   = media.length ? Math.round(totalComments / media.length) : 0
  const engRate       = followers > 0 ? ((totalLikes + totalComments) / followers * 100).toFixed(2) : '0.00'

  function momDelta(arr) {
    if (arr.length < 2) return null
    const prev = arr[arr.length-2], cur = arr[arr.length-1]
    return prev ? (((cur-prev)/prev)*100).toFixed(1) : null
  }
  const dL = momDelta(mLikes), dC = momDelta(mComments), dE = momDelta(mEng)

  const tipFollowers  = `${igFmtN(followers)} followers. ${media.length} posts tracked.`
  const tipLikes      = `${igFmtN(totalLikes)} total likes across ${media.length} posts.${dL !== null ? ' ' + (dL >= 0 ? `Up ${dL}%` : `Down ${Math.abs(dL)}%`) + ' from last month.' : ''}`
  const tipComments   = `${igFmtN(totalComments)} total comments. Avg ${igFmtN(avgComments)}/post.${dC !== null ? ' ' + (dC >= 0 ? `Up ${dC}%` : `Down ${Math.abs(dC)}%`) + ' from last month.' : ''}`
  const tipAvgLikes   = `${igFmtN(avgLikes)} avg likes per post.${dL !== null ? ' ' + (dL >= 0 ? `Trending up.` : `Trending down.`) : ''}`
  const tipAvgComments = `${igFmtN(avgComments)} avg comments per post.`
  const tipEng        = `${engRate}% engagement rate (likes+comments / followers). ${+engRate > 3 ? '✅ Above average (2–3%).' : '⚠ Try stronger CTAs and reels.'}`

  const metrics = `<div class="ag6" style="margin-bottom:14px">
    <div class="a-metric" data-tooltip="${tipFollowers}">
      <div class="metric-label">FOLLOWERS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${igFmtN(followers)}</div><div class="metric-sub">account total</div></div>${ttSparkline([], '#E1306C')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipLikes}">
      <div class="metric-label">TOTAL LIKES</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${igFmtN(totalLikes)}</div><div class="metric-sub">${media.length} posts</div></div>${ttSparkline(mLikes,'#E1306C')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipComments}">
      <div class="metric-label">TOTAL COMMENTS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${igFmtN(totalComments)}</div><div class="metric-sub">${media.length} posts</div></div>${ttSparkline(mComments,'#8b5cf6')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipAvgLikes}">
      <div class="metric-label">AVG LIKES</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${igFmtN(avgLikes)}</div><div class="metric-sub">per post</div></div>${ttSparkline(mAvg,'#f43f5e')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipAvgComments}">
      <div class="metric-label">AVG COMMENTS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${igFmtN(avgComments)}</div><div class="metric-sub">per post</div></div>${ttSparkline(mEng,'#f59e0b')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipEng}">
      <div class="metric-label">ENGAGEMENT RATE</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${engRate}%</div><div class="metric-sub">(likes+comments)/followers</div></div>${ttSparkline(mEng,'#3b82f6')}</div>
    </div>
  </div>`

  const topReel = media.length
    ? `<div id="ig-monthly-top" style="margin-bottom:16px">${renderIGTopReel(media, igMonthFilter)}</div>`
    : ''

  const tableContent = igPostTab === 'last5'
    ? renderIGPostTableRows(media.slice(0, 5), media)
    : renderIGPaginatedTable(igPostTab === 'all' ? media : media.slice(0, 20), media, igPostPage, 5)

  return `${metrics}${topReel}
  <div class="tt-tabs">
    <button class="tt-tab${igPostTab==='last5'?' active':''}" data-igtab="last5" onclick="switchIGPostTab('last5')" style="${igPostTab==='last5'?'background:#E1306C;border-color:#E1306C;color:#fff;':''}">Last 5</button>
    <button class="tt-tab${igPostTab==='last20'?' active':''}" data-igtab="last20" onclick="switchIGPostTab('last20')" style="${igPostTab==='last20'?'background:#E1306C;border-color:#E1306C;color:#fff;':''}">Last 20</button>
    <button class="tt-tab${igPostTab==='all'?' active':''}" data-igtab="all" onclick="switchIGPostTab('all')" style="${igPostTab==='all'?'background:#E1306C;border-color:#E1306C;color:#fff;':''}">All Posts</button>
    <span style="margin-left:auto;font-size:10px;color:var(--text3);align-self:center">${media.length} total</span>
  </div>
  <div id="ig-post-table">${tableContent}</div>`
}

  const chartHtml = data.length < 2
    ? `<div style="padding:20px;text-align:center;font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)">Not enough data for this range</div>`
    : `<div class="tt-chart-wrap">${legend}${renderLineChart(data, mc.key, mc.color)}</div>`
  return `<div class="tt-tabs" style="flex-wrap:wrap;gap:5px;margin-bottom:10px">${metricTabs}</div>
    <div class="tt-range-wrap">${rangeBtns}</div>
    ${chartHtml}`
}

function switchIGMainTab(tab) {
  igMainTab = tab
  const el = document.getElementById('ig-main-content')
  if (!el || !igData.profile) return
  el.innerHTML = tab === 'trends'
    ? renderIGTrendsTab(igData.media)
    : renderIGOverviewContent(igData.profile, igData.media)
  document.querySelectorAll('.ig-main-tab').forEach(btn => {
    const active = btn.dataset.tab === tab
    btn.classList.toggle('active', active)
    btn.style.color            = active ? '#E1306C' : ''
    btn.style.borderBottomColor = active ? '#E1306C' : ''
  })
}
window.switchIGMainTab = switchIGMainTab

function switchIGPostTab(tab) {
  igPostTab  = tab
  igPostPage = 0
  const el = document.getElementById('ig-post-table')
  if (!el) return
  if (tab === 'last5') {
    el.innerHTML = renderIGPostTableRows(igData.media.slice(0, 5), igData.media)
  } else {
    const pool = tab === 'all' ? igData.media : igData.media.slice(0, 20)
    el.innerHTML = renderIGPaginatedTable(pool, igData.media, 0, 5)
  }
  document.querySelectorAll('[data-igtab]').forEach(btn => {
    const active = btn.dataset.igtab === tab
    btn.classList.toggle('active', active)
    btn.style.background  = active ? '#E1306C' : ''
    btn.style.borderColor = active ? '#E1306C' : ''
    btn.style.color       = active ? '#fff' : ''
  })
}
window.switchIGPostTab = switchIGPostTab

  const pool = igPostTab === 'all' ? igData.media : igData.media.slice(0, 20)
  el.innerHTML = renderIGPaginatedTable(pool, igData.media, page, 5)

async function fetchIGProfile(accountId, token) {
  const fields = 'followers_count,media_count,username,profile_picture_url,biography'
  const res = await fetch(`${IG_API_BASE}/${accountId}?fields=${fields}&access_token=${token}`)
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(`IG profile failed (${res.status}): ${err.error?.message || res.statusText}`)
  }
  return res.json()
}

async function fetchIGMedia(accountId, token) {
  const fields = 'id,caption,media_type,timestamp,like_count,comments_count,media_url,thumbnail_url'
  const res = await fetch(`${IG_API_BASE}/${accountId}/media?fields=${fields}&limit=20&access_token=${token}`)
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(`IG media failed (${res.status}): ${err.error?.message || res.statusText}`)
  }
  const data = await res.json()
  return data.data || []
}

async function fetchIGInsights(accountId, token) {
  try {
    const res = await fetch(`${IG_API_BASE}/${accountId}/insights?metric=impressions,reach,profile_views&period=day&access_token=${token}`)
    if (!res.ok) return null
    const data = await res.json()
    return data.data || null
  } catch { return null }
}

async function initInstagramFromSupabase() {
  const tokenRow = await sbGetIGToken()
  const cacheRow = await sbGetIGCache()

  if (cacheRow?.last_fetched_at) igLastFetchedAt = cacheRow.last_fetched_at

  if (tokenRow?.page_access_token && tokenRow?.instagram_account_id) {
    try {
      const [profile, media, insights] = await Promise.all([
        fetchIGProfile(tokenRow.instagram_account_id, tokenRow.page_access_token),
        fetchIGMedia(tokenRow.instagram_account_id, tokenRow.page_access_token),
        fetchIGInsights(tokenRow.instagram_account_id, tokenRow.page_access_token)
      ])
      igData = { profile, media, insights }
      igLastFetchedAt = new Date().toISOString()
      await sbSaveIGCache(profile, media, insights)
      igState = 'live'
    } catch (err) {
      console.error('IG fetch error:', err)
      if (cacheRow?.profile_data) {
        igData = { profile: cacheRow.profile_data, media: cacheRow.media_data || [], insights: cacheRow.insights_data || null }
        igState = 'expired'
      } else {
        igData = { profile: null, media: [], insights: null }
        igState = 'no-data'
      }
    }
  } else if (cacheRow?.profile_data) {
    igData = { profile: cacheRow.profile_data, media: cacheRow.media_data || [], insights: cacheRow.insights_data || null }
    igState = 'expired'
  } else {
    igState = 'no-data'
  }
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—'
  if (typeof n !== 'number') return String(n)
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'K'
  return String(n)
}

function changeEl(v) {
  if (v === null || v === undefined) return '<div class="a-chg-nil">vs last week</div>'
  const pos = v >= 0
  return `<div class="${pos ? 'a-chg-pos' : 'a-chg-neg'}">${pos ? '↑' : '↓'} ${pos ? '+' : ''}${Math.abs(v).toFixed(1)}%</div>`
}

function sparklineSVG(data, color) {
  if (!data || data.length < 2) return '<div style="width:80px;height:40px"></div>'
  const W = 80, H = 40, P = 3
  const lo = Math.min(...data), hi = Math.max(...data), rng = hi - lo || 1
  const pts = data.map((v, i) => [
    P + (i / (data.length - 1)) * (W - P * 2),
    H - P - ((v - lo) / rng) * (H - P * 2)
  ])
  let line = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`
  for (let i = 1; i < pts.length; i++) {
    const cx = ((pts[i-1][0] + pts[i][0]) / 2).toFixed(1)
    line += ` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`
  }
  const area = `${line} L${pts[pts.length-1][0].toFixed(1)},${H} L${pts[0][0].toFixed(1)},${H}Z`
  return `<svg width="80" height="40" viewBox="0 0 80 40" aria-hidden="true" style="display:block">
    <path d="${area}" fill="${color}" fill-opacity="0.18"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`
}

function skeletonVal() {
  return '<div class="skeleton" style="height:1.6rem;width:55%;margin:6px 0 4px"></div>'
}

function toPhilippineTime(isoString) {
  if (!isoString) return '—'
  try {
    const d = new Date(isoString)
    return d.toLocaleString('en-US', {
      timeZone: 'Asia/Manila',
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true
    }) + ' PHT'
  } catch { return isoString }
}

// ─── YOUTUBE HELPERS ─────────────────────────────────────────────
function ytFmtN(n) {
  if (!n && n !== 0) return '—'
  const v = Number(n)
  if (v >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/,'')+'M'
  if (v >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,'')+'K'
  return String(v)
}

function ytEscH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function renderYTBarChart(videos) {
  if (!videos || videos.length === 0) return '<div class="tt-loading-state">No video data yet.</div>'
  const W = 500, H = 90, PL = 28, PR = 4, PT = 8, PB = 20
  const cw = W - PL - PR, ch = H - PT - PB
  const maxViews = Math.max(...videos.map(v => v.views), 1)
  const n = videos.length
  const slotW = cw / n
  const barW = Math.max(4, slotW - 4)

  const bars = videos.map((v, i) => {
    const barH = Math.max(2, (v.views / maxViews) * ch)
    const x = PL + i * slotW + (slotW - barW) / 2
    const y = PT + ch - barH
    const fv = ytFmtN(v.views)
    const dateStr = v.published_at
      ? new Date(v.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : ''
    const tipTitle = (v.title || '').substring(0, 28) + ((v.title || '').length > 28 ? '…' : '')
    const tip = (tipTitle + ' · ' + fv + ' views').replace(/'/g, '&#39;')
    const cx = (x + barW / 2).toFixed(1)
    return `<g onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer">
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
        fill="#FF0000" fill-opacity="${v.views > 0 ? 0.75 : 0.15}" rx="2"/>
      <text x="${cx}" y="${(H - PB + 11).toFixed(1)}" text-anchor="middle"
        font-size="5" fill="var(--text3)" font-family="system-ui">${dateStr}</text>
    </g>`
  }).join('')

  const yTicks = [0, 0.5, 1].map(t => {
    const y = (PT + (1 - t) * ch).toFixed(1)
    const lbl = ytFmtN(Math.round(maxViews * t))
    return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>
            <text x="${PL - 4}" y="${(+y + 2).toFixed(1)}" text-anchor="end" font-size="5" fill="var(--text3)" font-family="system-ui">${lbl}</text>`
  }).join('')

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    ${yTicks}${bars}
  </svg>`
}

function renderYTVideoTable(videos) {
  if (!videos || videos.length === 0) return ''
  const maxViews = Math.max(...ytVideos.map(v => v.views), 1)
  return videos.map(v => {
    const barPct = Math.round((v.views / maxViews) * 100)
    const title = ytEscH(v.title || '(No title)')
    const date = v.published_at
      ? new Date(v.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : ''
    const thumb = v.thumbnail
      ? `<img src="${ytEscH(v.thumbnail)}" class="yt-vt-thumb" alt="">`
      : `<div class="yt-vt-thumb-placeholder">▶</div>`
    return `<div class="tt-vt-row">
      ${thumb}
      <div class="tt-vt-meta">
        <div class="tt-vt-title" title="${title}">${title}</div>
        <div class="tt-vt-stats">
          <span>👁 ${ytFmtN(v.views)}</span>
          <span>♥ ${ytFmtN(v.likes)}</span>
          <span>💬 ${ytFmtN(v.comments)}</span>
        </div>
        <div class="tt-vt-bar-wrap"><div class="tt-vt-bar" style="width:${barPct}%;background:#FF0000"></div></div>
      </div>
      <div class="tt-vt-date">${date}</div>
    </div>`
  }).join('')
}

function ytMomDelta(arr) {
  if (!arr || arr.length < 2) return null
  const prev = arr[arr.length - 2], cur = arr[arr.length - 1]
  return prev ? (((cur - prev) / prev) * 100).toFixed(1) : null
}
function ytTrendStr(d) {
  if (d === null) return ''
  return +d >= 0 ? `Up ${d}% recently.` : `Down ${Math.abs(d)}% recently.`
}

// ─── YOUTUBE GROUP HELPERS ────────────────────────────────────────
function groupYTByMonth(videos) {
  const map = {}
  videos.forEach(v => {
    if (!v.published_at) return
    const d   = new Date(v.published_at)
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
    const lbl = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
    if (!map[key]) map[key] = { key, label: lbl, videos: [], views: 0, likes: 0, comments: 0, count: 0 }
    map[key].videos.push(v)
    map[key].views    += v.views    || 0
    map[key].likes    += v.likes    || 0
    map[key].comments += v.comments || 0
    map[key].count    += 1
  })
  return Object.values(map).sort((a, b) => a.key.localeCompare(b.key))
}
function enrichYTData(data) {
  return data.map(m => ({
    ...m,
    avg: m.count ? Math.round(m.views / m.count) : 0,
    eng: m.views > 0 ? +((m.likes + m.comments) / m.views * 100).toFixed(2) : 0
  }))
}
function getYTChartData(videos, range) {
  const now     = new Date()
  const byMonth = enrichYTData(groupYTByMonth(videos))
  if (range === 'all') return byMonth
  const n = range === '6m' ? 6 : 3
  const cutoff = new Date(now)
  cutoff.setMonth(cutoff.getMonth() - n)
  const cutKey = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}`
  return byMonth.filter(m => m.key >= cutKey)
}

  const monthData = byMonth.find(m => m.key === selectedMonth)
  let cardHtml

  } else {
    const top  = monthData.videos.reduce((a, b) => (b.views||0) > (a.views||0) ? b : a)
    const date = top.published_at ? new Date(top.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : ''

    const thumb = top.thumbnail

// ─── YOUTUBE CHART RENDERERS ──────────────────────────────────────

function renderYTLineChartSmall(values, color) {
  if (!values || values.length < 2) return '<div class="tt-loading-state">Not enough data for trend.</div>'
  const W = 500, H = 68, PL = 34, PR = 6, PT = 6, PB = 18
  const cw = W - PL - PR, ch = H - PT - PB
  const maxV = Math.max(...values, 1)
  const minV = Math.min(...values, 0)
  const range = maxV - minV || 1
  const n = values.length
  const xOf = i => PL + (i / (n - 1)) * cw
  const yOf = v => PT + (1 - (v - minV) / range) * ch
  const pts = values.map((v, i) => `${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ')
  const baseY = (PT + ch).toFixed(1)
  const areaPoints = `${PL.toFixed(1)},${baseY} ${pts} ${(PL + cw).toFixed(1)},${baseY}`
  const dots = values.map((v, i) => {
    const x = xOf(i).toFixed(1), y = yOf(v).toFixed(1)
    const daysAgo = n - 1 - i
    const dt = new Date(); dt.setDate(dt.getDate() - daysAgo)
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    const prev = values[i - 1]
    let pctStr = ''
    if (i > 0 && prev) {
      const pct = (((v - prev) / prev) * 100).toFixed(0)
      pctStr = ` · ${pct >= 0 ? '+' : ''}${pct}% vs prev`
    }
    const tip = `${dateStr}: ${ytFmtN(v)}${pctStr}`.replace(/'/g, '&#39;')
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="${color}" stroke="var(--bg)" stroke-width="1.2"
      onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer"/>`
  }).join('')
  const yTicks = [0, 1].map(t => {
    const y = (PT + (1 - t) * ch).toFixed(1)
    const lbl = ytFmtN(Math.round(minV + range * t))
    return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>
            <text x="${PL - 4}" y="${(+y + 2).toFixed(1)}" text-anchor="end" font-size="5" fill="var(--text3)" font-family="system-ui">${lbl}</text>`
  }).join('')
  const xLabels = values.map((v, i) => {
    if (n > 5 && i % 2 !== 0 && i !== n - 1) return ''
    const x = xOf(i).toFixed(1)
    const daysAgo = n - 1 - i
    const dt = new Date(); dt.setDate(dt.getDate() - daysAgo)
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    return `<text x="${x}" y="${H - 3}" text-anchor="middle" font-size="4.5" fill="var(--text3)" font-family="system-ui">${dateStr}</text>`
  }).join('')
  const gradId = `yt-lg-${color.replace('#','')}`
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${yTicks}${xLabels}
    <polygon points="${areaPoints}" fill="url(#${gradId})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`
}

function renderYTEngBarChart(videos) {
  if (!videos || videos.length === 0) return '<div class="tt-loading-state">No video data yet.</div>'
  const W = 500, H = 95, PL = 32, PR = 4, PT = 8, PB = 22
  const cw = W - PL - PR, ch = H - PT - PB
  const engData = videos.map(v => ({
    eng: v.views > 0 ? parseFloat(((v.likes + v.comments) / v.views * 100).toFixed(2)) : 0,
    title: v.title, published_at: v.published_at
  }))
  const maxEng = Math.max(...engData.map(e => e.eng), 0.1)
  const n = engData.length
  const slotW = cw / n, barW = Math.max(4, slotW - 4)
  const bars = engData.map((e, i) => {
    const barH = Math.max(2, (e.eng / maxEng) * ch)
    const x = PL + i * slotW + (slotW - barW) / 2
    const y = PT + ch - barH
    const dateStr = e.published_at ? new Date(e.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''
    const tipTitle = (e.title || '').substring(0, 28) + ((e.title || '').length > 28 ? '…' : '')
    const tip = `${tipTitle} · ${e.eng.toFixed(1)}% eng`.replace(/'/g, '&#39;')
    const cx = (x + barW / 2).toFixed(1)
    return `<g onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer">
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
        fill="#22c55e" fill-opacity="${e.eng > 0 ? 0.78 : 0.15}" rx="2"/>
      <text x="${cx}" y="${(H - PB + 12).toFixed(1)}" text-anchor="middle" font-size="5" fill="var(--text3)" font-family="system-ui">${dateStr}</text>
    </g>`
  }).join('')
  const yTicks = [0, 0.5, 1].map(t => {
    const y = (PT + (1 - t) * ch).toFixed(1)
    const lbl = (maxEng * t).toFixed(1) + '%'
    return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>
            <text x="${PL - 4}" y="${(+y + 2).toFixed(1)}" text-anchor="end" font-size="5" fill="var(--text3)" font-family="system-ui">${lbl}</text>`
  }).join('')
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    ${yTicks}${bars}
  </svg>`
}

function renderYTSubsDeltaBarChart(weekly) {
  if (!weekly || weekly.length < 2) return '<div class="tt-loading-state">Not enough subscriber data.</div>'
  const W = 500, H = 95, PL = 32, PR = 4, PT = 8, PB = 22
  const cw = W - PL - PR, ch = H - PT - PB
  const deltas = weekly.slice(1).map((v, i) => v - weekly[i])
  const maxD = Math.max(...deltas.map(Math.abs), 1)
  const n = deltas.length
  const slotW = cw / n, barW = Math.max(4, slotW - 4)
  const bars = deltas.map((delta, i) => {
    const barH = Math.max(2, (Math.abs(delta) / maxD) * ch)
    const x = PL + i * slotW + (slotW - barW) / 2
    const y = delta >= 0 ? PT + ch - barH : PT + ch
    const daysAgo = n - i - 1
    const dt = new Date(); dt.setDate(dt.getDate() - daysAgo)
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    const tip = `${dateStr}: ${delta >= 0 ? '+' : ''}${delta} subs`.replace(/'/g, '&#39;')
    const color = delta >= 0 ? '#22c55e' : '#f87171'
    const cx = (x + barW / 2).toFixed(1)
    return `<g onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer">
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
        fill="${color}" fill-opacity="0.78" rx="2"/>
      <text x="${cx}" y="${(H - PB + 12).toFixed(1)}" text-anchor="middle" font-size="5" fill="var(--text3)" font-family="system-ui">${dateStr}</text>
    </g>`
  }).join('')
  const baseY = (PT + ch).toFixed(1)
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    <line x1="${PL}" y1="${baseY}" x2="${W - PR}" y2="${baseY}" stroke="var(--border)" stroke-width="1"/>
    ${bars}
  </svg>`
}

function ttEscH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function updateFollowerHistory(count) {
  const today   = new Date().toISOString().split('T')[0]
  let history   = JSON.parse(localStorage.getItem('tt_follower_history') || '[]')
  const last    = history[history.length - 1]
  if (!last || last.date !== today) {
    history.push({ date: today, count: Number(count) || 0 })
    if (history.length > 60) history = history.slice(-60)
    localStorage.setItem('tt_follower_history', JSON.stringify(history))
  }
  return history
}
function getFollowerHistory() {

function ttFmtN(n) {
  if (!n && n !== 0) return '—'
  const v = Number(n)
  if (v >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/,'')+'M'
  if (v >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,'')+'K'
  return String(v)
}
function ttFmtDate(ts) {
  if (!ts) return ''
  const d = new Date(Number(ts) * 1000)
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
}

function groupByMonth(videos) {
  const map = {}
  videos.forEach(v => {
    if (!v.create_time) return
    const d   = new Date(Number(v.create_time) * 1000)
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
    const lbl = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
    if (!map[key]) map[key] = { key, label: lbl, videos: [], views: 0, likes: 0, comments: 0, count: 0 }
    map[key].videos.push(v)
    map[key].views    += v.view_count    || 0
    map[key].likes    += v.like_count    || 0
    map[key].comments += v.comment_count || 0
    map[key].count    += 1
  })
  return Object.values(map).sort((a, b) => a.key.localeCompare(b.key))
}

function ttSparkline(values, color, w = 72, h = 32) {
  if (!values || values.length < 2) return `<div style="width:${w}px;height:${h}px"></div>`
  const lo = 0, hi = Math.max(...values, 1), P = 2
  const pts = values.map((v, i) => [
    P + (i / (values.length - 1)) * (w - P * 2),
    P + (1 - v / hi) * (h - P * 2)
  ])
  let line = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`
  for (let i = 1; i < pts.length; i++) {
    const cx = ((pts[i-1][0] + pts[i][0]) / 2).toFixed(1)
    line += ` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`
  }
  const area = `${line} L${pts[pts.length-1][0].toFixed(1)},${h} L${pts[0][0].toFixed(1)},${h}Z`
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;flex-shrink:0">
    <path d="${area}" fill="${color}" fill-opacity="0.15"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`
}

function groupByDay(videos, filterMonth) {
  const map = {}
  videos.forEach(v => {
    if (!v.create_time) return
    const d    = new Date(Number(v.create_time) * 1000)
    const mKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
    if (filterMonth && mKey !== filterMonth) return
    const key  = d.toISOString().split('T')[0]
    const lbl  = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    if (!map[key]) map[key] = { key, label: lbl, videos: [], views: 0, likes: 0, comments: 0, count: 0 }
    map[key].views    += v.view_count    || 0
    map[key].likes    += v.like_count    || 0
    map[key].comments += v.comment_count || 0
    map[key].count    += 1
  })
  return Object.values(map).sort((a, b) => a.key.localeCompare(b.key))
}

function enrichData(data) {
  return data.map(m => ({
    ...m,
    avg: m.count ? Math.round(m.views / m.count) : 0,
    eng: m.views > 0 ? +((m.likes + m.comments) / m.views * 100).toFixed(2) : 0
  }))
}

function getChartData(videos, range) {
  const now = new Date()
  if (range === 'month') {
    const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
    return enrichData(groupByDay(videos, curMonth))
  }
  const byMonth = groupByMonth(videos)
  if (range === 'all') return enrichData(byMonth)
  const n = range === '6m' ? 6 : 3
  const cutoff = new Date(now)
  cutoff.setMonth(cutoff.getMonth() - n)
  const cutKey = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}`
  return enrichData(byMonth.filter(m => m.key >= cutKey))
}

function renderLineChart(data, valueKey, color) {
  if (!data || data.length < 2) return '<div class="tt-loading-state">Not enough data for this range.</div>'
  const W = 500, H = 80, PL = 24, PR = 4, PT = 6, PB = 16
  const vals = data.map(m => m[valueKey] || 0)
  const hi = Math.max(...vals, 1)
  const cw = W - PL - PR, ch = H - PT - PB
  const pts = data.map((m, i) => [
    PL + (i / (data.length - 1)) * cw,
    PT + (1 - (m[valueKey] || 0) / hi) * ch
  ])
  let line = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`
  for (let i = 1; i < pts.length; i++) {
    const cx = ((pts[i-1][0] + pts[i][0]) / 2).toFixed(1)
    line += ` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`
  }
  const area = `${line} L${pts[pts.length-1][0].toFixed(1)},${H-PB} L${pts[0][0].toFixed(1)},${H-PB}Z`
  const xLabels = data.map((m, i) =>
    `<text x="${pts[i][0].toFixed(1)}" y="${H-PB+11}" text-anchor="middle" font-size="5" fill="var(--text3)" font-family="system-ui">${m.label}</text>`
  ).join('')
  const yTicks = [0, 0.5, 1].map(t => {
    const y = (PT + (1 - t) * ch).toFixed(1)
    const v = Math.round(hi * t)
    const lbl = v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(1)+'K' : String(v)
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>
            <text x="${PL-3}" y="${(+y+2).toFixed(1)}" text-anchor="end" font-size="5" fill="var(--text3)" font-family="system-ui">${lbl}</text>`
  }).join('')
  const dots = pts.map((pt, i) => {
    const v = data[i][valueKey] || 0
    const fv = valueKey === 'eng' ? v.toFixed(2)+'%' : (v >= 1000 ? (v/1000).toFixed(1)+'K' : String(v))
    const tip = (data[i].label + ': ' + fv).replace(/'/g, '&#39;')
    return `<g onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer">
      <circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="7" fill="transparent"/>
      <circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="2.5" fill="${color}" stroke="var(--surface2)" stroke-width="1.5"/>
    </g>`
  }).join('')
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    ${yTicks}
    <path d="${area}" fill="${color}" fill-opacity="0.1"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLabels}
  </svg>`
}

function generateChartInsight(data, valueKey, metricLabel) {
  if (!data || data.length < 2) return ''
  const vals  = data.map(m => m[valueKey] || 0)
  const n     = vals.length
  const first = vals[0], last = vals[n - 1]
  const maxVal = Math.max(...vals), maxIdx = vals.lastIndexOf(maxVal)
  const minVal = Math.min(...vals), minIdx = vals.indexOf(minVal)
  const isEng  = valueKey === 'eng'
  const fmt = v => isEng ? v.toFixed(1) + '%' : (v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(1)+'K' : String(Math.round(v)))
  const avg   = vals.reduce((a, b) => a + b, 0) / n
  const overallPct = first > 0 ? Math.round((last - first) / first * 100) : 0
  const peakedMid  = maxIdx > 0 && maxIdx < n - 1 && maxVal > avg * 1.3
  const dipMid     = minIdx > 0 && minIdx < n - 1 && minVal < avg * 0.6
  const recentUp   = n >= 2 && last > vals[n - 2] * 1.15
  const recentDown = n >= 2 && last < vals[n - 2] * 0.85

  let text = ''
  if (peakedMid && last < maxVal * 0.75) {
    const dropPct = Math.round((maxVal - last) / maxVal * 100)
    text = `Peaked at ${fmt(maxVal)} in ${data[maxIdx].label}, then declined ${dropPct}% through ${data[n-1].label}.`
    if (recentUp) text += ' Slight recovery in the most recent period.'
  } else if (dipMid && last > minVal * 1.3) {
    text = `Dipped to ${fmt(minVal)} in ${data[minIdx].label} but has since recovered to ${fmt(last)}.`
  } else if (overallPct >= 50) {
    text = `Strong upward trend — up ${overallPct}% from ${data[0].label} to ${data[n-1].label}.`
    if (recentDown) text += ' Momentum slowing in the latest period.'
  } else if (overallPct >= 15) {
    text = `Gradual growth of ${overallPct}% over this period.`
    if (recentUp) text += ' Growth is accelerating recently.'
  } else if (overallPct <= -50) {
    text = `Sharp decline of ${Math.abs(overallPct)}% since ${data[0].label}.`
    if (recentUp) text += ' Most recent period shows early signs of recovery.'
  } else if (overallPct <= -15) {
    text = `Declining trend, down ${Math.abs(overallPct)}% over this period.`
    if (recentUp) text += ' Latest period bucked the trend — worth watching.'
  } else {
    const dir = overallPct >= 0 ? `up ${overallPct}%` : `down ${Math.abs(overallPct)}%`
    text = `Relatively stable over this period — ${dir} overall.`
  }
  if (!text.includes(data[maxIdx].label) && maxVal > avg * 1.5) {
    text += ` Best period: ${data[maxIdx].label} (${fmt(maxVal)}).`
  }
  return text
}

  const byMonth       = groupByMonth(videos)
  const totalViews    = videos.reduce((s, v) => s + (v.view_count    || 0), 0)
  const totalLikes    = videos.reduce((s, v) => s + (v.like_count    || 0), 0)
  const totalComments = videos.reduce((s, v) => s + (v.comment_count || 0), 0)
  const avgViews      = videos.length ? Math.round(totalViews / videos.length) : 0
  const engRate       = totalViews > 0 ? ((totalLikes + totalComments) / totalViews * 100).toFixed(2) : '0.00'
  const mViews    = byMonth.map(m => m.views)
  const mLikes    = byMonth.map(m => m.likes)
  const mComments = byMonth.map(m => m.comments)
  const mAvg      = byMonth.map(m => m.count ? Math.round(m.views / m.count) : 0)
  const mEng      = byMonth.map(m => m.views > 0 ? +((m.likes+m.comments)/m.views*100).toFixed(2) : 0)
  function momDelta(arr) {
    if (arr.length < 2) return null
    const prev = arr[arr.length-2], cur = arr[arr.length-1]
    return prev ? (((cur-prev)/prev)*100).toFixed(1) : null
  }
  function trendLine(d) { return d === null ? '' : d >= 0 ? `Up ${d}% from last month.` : `Down ${Math.abs(d)}% from last month.` }
  const dv = momDelta(mViews), de = momDelta(mEng), da = momDelta(mAvg)
  const fHistory   = getFollowerHistory()
  const mFollowers = fHistory.length >= 2 ? fHistory.map(h => h.count) : []
  const fTrendNote = fHistory.length >= 2 ? ` Tracking since ${fHistory[0].date}.` : ' Sparkline builds as you revisit.'
  const tipFollowers = `${ttFmtN(user.follower_count)} total followers.${fTrendNote} Keep posting daily to accelerate growth.`
  const tipViews     = `${ttFmtN(totalViews)} views across ${videos.length} videos. ${trendLine(dv)}`
  const tipLikes     = `Like rate: ${totalViews > 0 ? ((totalLikes/totalViews)*100).toFixed(1) : 0}% of views. Industry avg is 3–5%.`
  const tipComments  = `Comment rate: ${totalViews > 0 ? ((totalComments/totalViews)*100).toFixed(2) : 0}% of views. Comments signal strong audience connection.`
  const tipAvg       = `${ttFmtN(avgViews)} avg views/video. ${trendLine(da)} ${avgViews > 1000 ? 'Solid performance.' : 'Hook the first 3 seconds harder.'}`
  const tipEng       = `${engRate}% engagement. ${+engRate > 5 ? '🔥 Top tier.' : +engRate > 2 ? '✅ Above average.' : '⚠ Add stronger CTAs.'} ${trendLine(de)}`
  const tableContent = ttActiveTab === 'last5'
    ? renderVideoTableRows(videos.slice(0, 5), videos)
    : renderPaginatedTable(ttActiveTab === 'all' ? videos : videos.slice(0, 20), videos, ttVideoPage, 5)

  return `<div class="ag6" style="margin-bottom:14px">
    <div class="a-metric" data-tooltip="${tipFollowers}">
      <div class="metric-label">FOLLOWERS</div>
      <div class="tt-metric-inner">
        <div><div class="metric-val" style="margin-top:4px">${ttFmtN(user.follower_count)}</div><div class="metric-sub">${mFollowers.length >= 2 ? mFollowers.length + ' day history' : 'account total'}</div></div>
        ${mFollowers.length >= 2 ? ttSparkline(mFollowers, '#00C2A8') : ''}
      </div>
    </div>
    <div class="a-metric" data-tooltip="${tipViews}">
      <div class="metric-label">TOTAL VIEWS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${ttFmtN(totalViews)}</div><div class="metric-sub">all ${videos.length} videos</div></div>${ttSparkline(mViews,'#00C2A8')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipLikes}">
      <div class="metric-label">TOTAL LIKES</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${ttFmtN(totalLikes)}</div><div class="metric-sub">all videos</div></div>${ttSparkline(mLikes,'#f43f5e')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipComments}">
      <div class="metric-label">TOTAL COMMENTS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${ttFmtN(totalComments)}</div><div class="metric-sub">all videos</div></div>${ttSparkline(mComments,'#8b5cf6')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipAvg}">
      <div class="metric-label">AVG VIEWS</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${ttFmtN(avgViews)}</div><div class="metric-sub">${videos.length} videos</div></div>${ttSparkline(mAvg,'#f59e0b')}</div>
    </div>
    <div class="a-metric" data-tooltip="${tipEng}">
      <div class="metric-label">ENGAGEMENT RATE</div>
      <div class="tt-metric-inner"><div><div class="metric-val" style="margin-top:4px">${engRate}%</div><div class="metric-sub">(likes+comments)/views</div></div>${ttSparkline(mEng,'#3b82f6')}</div>
    </div>
  </div>
  <div id="tt-monthly-top" style="margin-bottom:16px">${renderMonthlyTopVideoInner(videos, ttMonthFilter)}</div>
  <div class="tt-tabs">
    <button class="tt-tab${ttActiveTab==='last5'?' active':''}" data-tab="last5" onclick="switchTikTokVideoTab('last5')">Last 5</button>
    <button class="tt-tab${ttActiveTab==='last20'?' active':''}" data-tab="last20" onclick="switchTikTokVideoTab('last20')">Last 20</button>
    <button class="tt-tab${ttActiveTab==='all'?' active':''}" data-tab="all" onclick="switchTikTokVideoTab('all')">All Videos</button>
    <span style="margin-left:auto;font-size:10px;color:var(--text3);align-self:center">${videos.length} total</span>
  </div>
  <div id="tt-video-table">${tableContent}</div>`
}

function renderVideoTableRows(videos, allVideos) {
  if (!videos || videos.length === 0) {
    return '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">No videos found</div>'
  }
  const maxViews = Math.max(...allVideos.map(v => v.view_count || 0), 1)
  return videos.map(v => {
    const title  = ttEscH(v.title || v.video_description || '(No title)')
    const barPct = Math.round(((v.view_count || 0) / maxViews) * 100)
    const thumb  = v.cover_image_url
      ? `<img src="${ttEscH(v.cover_image_url)}" class="tt-vt-thumb" alt="">`
      : `<div class="tt-vt-thumb" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">▶</div>`
    return `<div class="tt-vt-row">
      ${thumb}
      <div class="tt-vt-meta">
        <div class="tt-vt-title" title="${title}">${title}</div>
        <div class="tt-vt-stats">
          <span>👁 ${ttFmtN(v.view_count)}</span>
          <span>♥ ${ttFmtN(v.like_count)}</span>
          <span>💬 ${ttFmtN(v.comment_count)}</span>
        </div>
        <div class="tt-vt-bar-wrap"><div class="tt-vt-bar" style="width:${barPct}%"></div></div>
      </div>
      <div class="tt-vt-date">${ttFmtDate(v.create_time)}</div>
    </div>`
  }).join('')
}

function renderPaginatedTable(pool, allVideos, page, pageSize) {
  const totalPages = Math.ceil(pool.length / pageSize)
  const rows = renderVideoTableRows(pool.slice(page * pageSize, (page + 1) * pageSize), allVideos)
  if (totalPages <= 1) return rows
  return `${rows}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
    <button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setTikTokVideoPage(${page-1})"${page===0?' disabled':''}>← Prev</button>
    <span style="font-size:11px;color:var(--text3)">Page ${page+1} of ${totalPages} · ${pool.length} videos</span>
    <button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setTikTokVideoPage(${page+1})"${page>=totalPages-1?' disabled':''}>Next →</button>
  </div>`
}
